name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine next version
        id: version
        run: |
          set -euo pipefail
          LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          if [[ -n "$LATEST_TAG" ]]; then
            CURRENT="${LATEST_TAG#v}"
            echo "Latest release tag: $LATEST_TAG → current=$CURRENT"
          else
            CURRENT="0.0.0"
            echo "No release tags found → current=0.0.0 (first release)"
          fi
          if [[ ! "$CURRENT" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Could not parse current version (got: '$CURRENT')"
            exit 1
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ inputs.bump }}" in
            major) NEW="$((MAJOR+1)).0.0" ;;
            minor) NEW="${MAJOR}.$((MINOR+1)).0" ;;
            patch) NEW="${MAJOR}.${MINOR}.$((PATCH+1))" ;;
          esac
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $NEW"

      - name: Verify tag does not exist
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} already exists"
            exit 1
          fi

      - name: Ensure previous tag exists
        env:
          PREV_TAG: v${{ steps.version.outputs.current }}
        run: |
          set -euo pipefail
          if git rev-parse "$PREV_TAG" >/dev/null 2>&1; then
            echo "Previous tag $PREV_TAG already exists."
            exit 0
          fi
          ROOT=$(git rev-list --max-parents=0 HEAD | tail -n1)
          echo "Previous tag $PREV_TAG does not exist; creating it at root commit $ROOT."
          git tag "$PREV_TAG" "$ROOT"
          git push origin "$PREV_TAG"

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff@2

      - name: Auto-fill [Unreleased] from git log if empty
        env:
          PREV_TAG: v${{ steps.version.outputs.current }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os
          import pathlib
          import re
          import subprocess
          import sys

          prev_tag = os.environ["PREV_TAG"]
          path = pathlib.Path("CHANGELOG.md")
          text = path.read_text()

          m = re.search(r"^## \[Unreleased\]\s*\n(.*?)(?=^## \[|\Z)", text, re.M | re.S)
          if not m:
              print("::error::Could not find '## [Unreleased]' header in CHANGELOG.md", file=sys.stderr)
              sys.exit(1)

          body = m.group(1)
          has_real_bullets = any(re.match(r"^-\s+\S", ln) for ln in body.splitlines())
          if has_real_bullets:
              print("[Unreleased] already has manual entries; skipping auto-fill.")
              sys.exit(0)

          print(f"[Unreleased] is empty; generating from git log since {prev_tag}...")
          result = subprocess.run(
              ["git-cliff", "--config", "cliff.toml", "--strip", "all", f"{prev_tag}..HEAD"],
              check=True,
              capture_output=True,
              text=True,
          )
          generated = result.stdout.strip()
          if not generated:
              print(
                  f"::error::No release-worthy commits found between {prev_tag} and HEAD. "
                  "Either add a manual entry to [Unreleased] in CHANGELOG.md, or commit "
                  "changes with a recognised prefix (Add/Fix/Refactor/Update/Remove/...).",
                  file=sys.stderr,
              )
              sys.exit(1)

          new_text = text[: m.start(1)] + generated + "\n\n" + text[m.end(1) :]
          path.write_text(new_text)
          print("----- auto-generated [Unreleased] body -----")
          print(generated)
          print("--------------------------------------------")
          PY

      - name: Extract release notes from CHANGELOG.md
        run: |
          set -euo pipefail
          python3 <<'PY'
          import pathlib
          import re
          import sys

          text = pathlib.Path("CHANGELOG.md").read_text()
          m = re.search(r"^## \[Unreleased\]\s*\n(.*?)(?=^## \[|\Z)", text, re.M | re.S)
          body = (m.group(1) if m else "").strip()

          # Keep "### Header" only if it has at least one real bullet ("- text").
          # Drop placeholder "-" lines and empty sections so notes are clean.
          parts = re.split(r"(?m)(^### .+$)", body)
          out = []
          for i in range(1, len(parts), 2):
              header = parts[i]
              section = parts[i + 1] if i + 1 < len(parts) else ""
              bullets = [ln for ln in section.splitlines() if re.match(r"^-\s+\S", ln)]
              if bullets:
                  if out:
                      out.append("")
                  out.append(header)
                  out.extend(bullets)

          result = "\n".join(out).strip()
          if not result:
              print(
                  "::error::[Unreleased] section in CHANGELOG.md is empty. "
                  "Add release notes before releasing.",
                  file=sys.stderr,
              )
              sys.exit(1)

          pathlib.Path("release-notes.md").write_text(result + "\n")
          print("----- release-notes.md -----")
          print(result)
          print("----------------------------")
          PY

      - name: Restore
        run: dotnet restore Vcs.slnx

      - name: Build
        run: dotnet build Vcs.slnx --no-restore --configuration Release /p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test Vcs.slnx --no-build --configuration Release

      - name: Pack
        run: dotnet pack Vcs.slnx --no-build --configuration Release --output ./artifacts /p:Version=${{ steps.version.outputs.version }}

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          shopt -s nullglob
          cd ./artifacts
          files=(*.nupkg *.snupkg)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "::error::No package files to hash in ./artifacts."
            exit 1
          fi
          sha256sum "${files[@]}" > SHA256SUMS
          cat SHA256SUMS

      - name: Push to NuGet.org
        run: dotnet nuget push "./artifacts/*.nupkg" --source "https://api.nuget.org/v3/index.json" --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate

      - name: Bump version in Directory.Build.props
        run: sed -i -E "s|<Version>[^<]+</Version>|<Version>${{ steps.version.outputs.version }}</Version>|" Directory.Build.props

      - name: Promote Unreleased section in CHANGELOG.md
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          PREV_TAG: v${{ steps.version.outputs.current }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os
          import pathlib
          import re
          import sys
          from datetime import datetime, timezone

          version = os.environ["VERSION"]
          tag = os.environ["TAG"]
          prev_tag = os.environ["PREV_TAG"]
          date = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          repo = "https://github.com/ZelAnton/vcs-toolkit-dotNet"

          path = pathlib.Path("CHANGELOG.md")
          text = path.read_text()

          new_unreleased = (
              "## [Unreleased]\n\n"
              "### Added\n-\n\n"
              "### Changed\n-\n\n"
              "### Fixed\n-\n\n"
              f"## [{version}] - {date}"
          )
          text, n = re.subn(r"^## \[Unreleased\]$", new_unreleased, text, count=1, flags=re.M)
          if n != 1:
              print("::error::Could not find '## [Unreleased]' header in CHANGELOG.md", file=sys.stderr)
              sys.exit(1)

          link_replacement = (
              f"[Unreleased]: {repo}/compare/{tag}...HEAD\n"
              f"[{version}]: {repo}/compare/{prev_tag}...{tag}"
          )
          text, n = re.subn(r"^\[Unreleased\]:.*$", link_replacement, text, count=1, flags=re.M)
          if n != 1:
              print("::error::Could not find '[Unreleased]: ...' reference link in CHANGELOG.md", file=sys.stderr)
              sys.exit(1)

          path.write_text(text)
          PY

      - name: Commit, tag, push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Directory.Build.props CHANGELOG.md
          git commit -m "Release ${{ steps.version.outputs.tag }}"
          git tag "${{ steps.version.outputs.tag }}"
          git push --atomic origin HEAD:refs/heads/main "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(./artifacts/*.nupkg ./artifacts/*.snupkg ./artifacts/SHA256SUMS)
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file release-notes.md \
            "${assets[@]}"
